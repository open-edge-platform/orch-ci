---

name: Pre-Merge CI Pipeline
permissions:
  contents: read

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  pre-merge:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: open-edge-platform/orch-ci/.github/workflows/pre-merge.yml@d9ed8a807b93697c1454b82e86a0c510a97520f8
    with:
      run_version_check: true
      run_dep_version_check: false
      run_build: false
      run_lint: true
      run_test: false
      run_validate_clean_folder: false
      run_docker_build: false
      bootstrap_tools: "go,gotools,nodejs"
      trivy_config_path: trivy.yaml
