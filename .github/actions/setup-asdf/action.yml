name: "Setup asdf and install dependencies"
description: "Install asdf and required dependencies"
runs:
  using: "composite"
  steps:
    - name: Install asdf
      uses: asdf-vm/actions/setup@b7bcd026f18772e44fe1026d729e1611cc435d47  # v4.0.1
      with:
        asdf_version: 0.18.0
    - name: Cache asdf plugins
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      id: asdf-cache
      with:
        path: |
          ~/.asdf/installs
          ~/.asdf/plugins
          ~/.asdf/shims
        key: ${{ runner.os }}-asdf-plugins-${{ hashFiles('**/.tool-versions') }}
        restore-keys: |
          ${{ runner.os }}-asdf-plugins-
    - name: Reshim installed ASDF tools
      shell: bash
      run: asdf reshim
    - name: Install dependencies
      shell: bash
      run: |
        for plugin in golang jq mage; do
          asdf plugin add "${plugin}"
          asdf install "${plugin}"
        done
        mage asdfPlugins
